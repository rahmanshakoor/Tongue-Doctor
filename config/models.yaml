# Per-agent model assignments. The LLMClient resolves provider + model + thinking from this file
# via a model_assignment_key (e.g. "reasoner"). Agents never hard-code model IDs.
#
# Identifiers are taken from KICKOFF_PLAN.md §4. Model IDs are stable; thinking levels are tunable.
# Provider strings are matched in src/tongue_doctor/models/__init__.py:get_client().

reasoner:
  provider: vertex_gemini
  model: gemini-3.1-pro
  thinking: medium                          # Default. complex_differential bumps to high.
  thinking_complex_differential: high
  max_output_tokens: 4096

devils_advocate:
  provider: vertex_anthropic
  model: claude-opus-4-7
  thinking:
    type: enabled
    budget_tokens: 16000
  max_output_tokens: 8192

safety_reviewer:
  provider: vertex_anthropic
  model: claude-sonnet-4-6
  thinking:
    type: enabled
    budget_tokens: 4000
  max_output_tokens: 2048

synthesizer:
  provider: vertex_gemini
  model: gemini-3.1-flash-lite
  thinking: low
  max_output_tokens: 2048

router:
  provider: vertex_gemini
  model: gemini-3.1-flash-lite
  thinking: low
  max_output_tokens: 512

multimodal_processor:
  provider: vertex_gemini
  model: gemini-3.1-pro
  thinking_ecg: high
  thinking_documents: medium
  thinking_default: medium
  max_output_tokens: 4096

research_prescriber:
  provider: vertex_gemini
  model: gemini-3.1-pro
  thinking: high
  max_output_tokens: 4096

# Offline extraction (Stern, Robbins, Harrison's, ...). Two-model cross-check per kickoff §4.
extraction_offline:
  primary:
    provider: vertex_anthropic
    model: claude-opus-4-7
    thinking:
      type: enabled
      budget_tokens: 24000
    max_output_tokens: 16384
  cross_check:
    provider: vertex_gemini
    model: gemini-3.1-pro
    thinking: high
    max_output_tokens: 16384
