  - 383
version: 1
reviewed_by: pending
reviewed_at: null
notes: >-
  Stern Ch.20 (pp. 364-383). Frame is primary-vs-secondary with explicit
  red-flag screen (SNOOPP10) at the top of the algorithm. Algorithm
  reconciled across Fig 20-1 (Diagnostic approach to headache) and the
  prose. Must-not-miss bucket: SAH, meningitis, GCA, CVT, RCVS, glaucoma,
  IIH, dissection.
