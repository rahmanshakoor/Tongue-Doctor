  - 311
version: 1
reviewed_by: pending
reviewed_at: null
notes: >-
  Stern Ch.15 (pp. 286-311). Frame is anatomic with explicit always-on
  differential of HF, pneumonia, COPD/asthma, PE plus the immediate
  threats captured by the ACT ASAP mnemonic. Algorithm steps 1-3 follow
  Stern's stepwise approach. Cross-references Ch.9 (Chest Pain), Ch.10
  (Cough/Respiratory), and Ch.33 (Wheezing).
