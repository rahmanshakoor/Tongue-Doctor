version: 1
reviewed_by: pending
reviewed_at: null
notes: >-
  Stern Ch.14 (pp. 260-285). Frame is categorical (vertigo / near syncope /
  dysequilibrium / ill-defined). Algorithm steps follow Stern Figs 14-1
  through 14-3. Must-not-miss bucket: central causes (stroke, hemorrhage,
  MS, tumor) plus cardiac causes of near syncope. HINTS exam is the
  bedside differentiator for acute vestibular syndrome.
