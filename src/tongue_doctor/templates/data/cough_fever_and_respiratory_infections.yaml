version: 1
reviewed_by: pending
reviewed_at: null
notes: >-
  Stern Ch.10 (pp. 186-213). Frame is categorical (URI vs. non-pneumonic LRTI
  vs. CAP vs. atypical pneumonia). Algorithm follows Fig 10-1 (need for chest
  film?) and Fig 10-2 (CAP vs. other-type). Must-not-miss bucket: TB,
  aspiration pneumonia, PJP, HAP / VAP, severe CAP. Treatment-class lists are
  educational; specific antibiotic regimens depend on severity, comorbidities,
  and local resistance patterns and are not user-facing prescription content.
