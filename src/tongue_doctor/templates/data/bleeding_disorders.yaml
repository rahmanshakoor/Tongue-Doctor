  - 163
version: 1
reviewed_by: pending
reviewed_at: null
notes: >-
  Stern Ch.8 (pp. 152-163). Frame is mechanistic — distinguish structural,
  platelet-related, and coagulation-factor causes by location, timing, and
  laboratory pattern. Algorithm follows Fig 8-1. Must-not-miss bucket
  includes HIT, TTP / HUS, DIC, hemophilia presenting with intracranial or
  retroperitoneal bleed, acquired factor inhibitors, and active bleeding on
  anticoagulants.
