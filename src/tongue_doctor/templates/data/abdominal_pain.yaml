  - 67
version: 1
reviewed_by: pending
reviewed_at: null
notes: >-
  Stern Ch.3 (pp. 40-67). Differential is the union across the chapter's three
  cases (mid-upper acute — Mr. C; ascending cholangitis — Mrs. R; chronic IBD —
  Ms. K), with any diagnosis that is "Active Alternative — Must Not Miss" in any
  case promoted to that bucket in the union. Algorithm is reconciled across
  Figure 3-1 (location-driven differential) and the chapter's per-quadrant
  flowcharts (Figures 3-2 to 3-6). Treatment classes are educational; specific
  drugs, doses, and procedural details are deliberately omitted.
