  - 245
version: 1
reviewed_by: pending
reviewed_at: null
notes: >-
  Stern Ch.12 (pp. 228-245). Frame is categorical — diabetes type +
  emergency state + complications. Algorithm covers screening, type
  classification, emergency triage, glycemic management, and complication
  screening. Must-not-miss bucket: DKA, HHS, hypoglycemia (especially
  sulfonylurea-induced), Type 1 DM presenting acutely, and macrovascular
  events. Complication management cross-references Stern Ch.7 (Back Pain),
  Ch.9 (Chest Pain), Ch.23 (Hypertension), and Ch.28 (AKI).
