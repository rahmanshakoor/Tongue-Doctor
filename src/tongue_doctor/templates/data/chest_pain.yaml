notes: >-
  Distilled from Stern, Cifu & Altkorn — Symptoms to Diagnosis (4th ed., 2020),
  Ch. 9 (pp. 164-185). The differential unions Stern's three patient cases
  (chronic stable angina — Mr. W; acute MI / nSTEMI / dissection — Mrs. G;
  subacute pleural effusion / pneumonia / PE — Mr. H), promoting any diagnosis
  that is "Active Alternative — Must Not Miss" in any case to that bucket in the
  union. Algorithm steps 1-4 follow Figure 9-1 (chronic) and steps 5-10 follow
  Figure 9-2 (acute), reconciled against the chapter prose. Treatment classes
  are educational; specific drugs / doses / regimens are deliberately omitted
  per safety invariant I-3 (prescription leak guard).
